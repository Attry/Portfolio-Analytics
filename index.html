
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinFolio - Portfolio Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Inter"', 'sans-serif'],
            },
            colors: {
              // Dynamic colors linked to CSS variables
              background: 'var(--bg-color)',
              surface: 'var(--surface-color)',
              border: 'var(--border-color)',
              primary: {
                DEFAULT: 'var(--primary-color)',
                glow: 'var(--primary-glow)',
                dim: 'var(--primary-dim)',
              },
              accent: {
                cyan: 'var(--accent-cyan)',
                pink: 'var(--accent-pink)',
                green: 'var(--accent-green)',
              },
              gray: {
                900: '#111827',
                800: '#1F2937',
                700: '#374151',
                600: '#4B5563',
                500: '#6B7280',
                400: '#9CA3AF',
                300: '#D1D5DB',
                200: '#E5E7EB',
                100: '#F3F4F6',
              },
              success: '#10b981', 
              danger: '#ef4444', 
            },
            animation: {
              'blob': 'blob 7s infinite',
              'fade-in': 'fadeIn 0.5s ease-out forwards',
              'bounce-in': 'bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards',
            },
            keyframes: {
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              },
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              bounceIn: {
                '0%': { transform: 'scale(0.3)', opacity: '0' },
                '50%': { transform: 'scale(1.05)' },
                '70%': { transform: 'scale(0.9)' },
                '100%': { transform: 'scale(1)', opacity: '1' },
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        /* Default Theme (Indian Equity) - Elegant Orange/Slate */
        --bg-color: #FAFAFA; /* Zinc 50 */
        --surface-color: #FFFFFF;
        --border-color: #E5E7EB; /* Gray 200 */
        --primary-color: #F97316; /* Orange 500 */
        --primary-glow: #FFEDD5; /* Orange 100 */
        --primary-dim: #EA580C; /* Orange 600 */
        --accent-cyan: #0EA5E9;
        --accent-pink: #EC4899;
        --accent-green: #10B981;
      }

      /* Corporate Theme (Mutual Funds) - Elegant Blue */
      .theme-corporate {
        --bg-color: #F8FAFC; /* Slate 50 */
        --surface-color: #FFFFFF;
        --border-color: #E2E8F0; /* Slate 200 */
        --primary-color: #3B82F6; /* Blue 500 */
        --primary-glow: #DBEAFE; /* Blue 100 */
        --primary-dim: #2563EB; /* Blue 600 */
        --accent-cyan: #38BDF8;
        --accent-pink: #818CF8;
        --accent-green: #34D399;
      }

      /* Gold Theme (Gold ETF) - Elegant Gold/Yellow */
      .theme-gold {
        --bg-color: #FFFAEB; /* Elegant warm white */
        --surface-color: #FFFFFF;
        --border-color: #FDE047; /* Yellow 300 */
        --primary-color: #EAB308; /* Yellow 500 */
        --primary-glow: #FEF08A; /* Yellow 200 */
        --primary-dim: #CA8A04; /* Yellow 600 */
        --accent-cyan: #FCD34D;
        --accent-pink: #F59E0B;
        --accent-green: #84CC16;
      }

      /* Sleek Theme (International) - Elegant Cyan */
      .theme-intl {
        --bg-color: #F0FDFA; /* Teal 50 */
        --surface-color: #FFFFFF;
        --border-color: #CCFBF1; /* Teal 100 */
        --primary-color: #06B6D4; /* Cyan 500 */
        --primary-glow: #CFFAFE; /* Cyan 100 */
        --primary-dim: #0891B2; /* Cyan 600 */
        --accent-cyan: #22D3EE;
        --accent-pink: #A855F7;
        --accent-green: #2DD4BF;
      }

      /* Cash Theme (Cash Equivalents) - Elegant Green */
      .theme-cash {
        --bg-color: #F0FDF4; /* Green 50 */
        --surface-color: #FFFFFF;
        --border-color: #DCFCE7; /* Green 100 */
        --primary-color: #10B981; /* Emerald 500 */
        --primary-glow: #D1FAE5; /* Emerald 100 */
        --primary-dim: #059669; /* Emerald 600 */
        --accent-cyan: #34D399;
        --accent-pink: #059669;
        --accent-green: #10B981;
      }
      
      /* Net Worth Theme (Consolidated) - Elegant Purple */
      .theme-networth {
        --bg-color: #FAF5FF; /* Purple 50 */
        --surface-color: #FFFFFF;
        --border-color: #F3E8FF; /* Purple 100 */
        --primary-color: #8B5CF6; /* Violet 500 */
        --primary-glow: #EDE9FE; /* Violet 100 */
        --primary-dim: #7C3AED; /* Violet 600 */
        --accent-cyan: #F472B6;
        --accent-pink: #A78BFA;
        --accent-green: #34D399;
      }

      html, body {
        height: 100%;
        min-height: 100vh;
        background-color: var(--bg-color);
        color: #111827; 
        transition: background-color 0.5s ease;
      }
      
      /* Elegant Backgrounds */
      .bg-pattern-dots {
        background-image: radial-gradient(var(--border-color) 1px, transparent 1px);
        background-size: 20px 20px;
        opacity: 0.4;
      }
      
      .bg-pattern-grid {
        background-image: linear-gradient(var(--border-color) 1px, transparent 1px),
                          linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
        background-size: 40px 40px;
        opacity: 0.4;
      }

      /* Elegant Panels & Cards */
      .glass-panel {
        background: var(--surface-color);
        border: 1px solid var(--border-color);
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
        border-radius: 16px;
      }
      
      .glass-card {
        background: var(--surface-color);
        border: 1px solid var(--border-color);
        box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.05), 0 1px 2px -1px rgb(0 0 0 / 0.05);
        border-radius: 12px;
        transition: all 0.2s ease-in-out;
      }
      
      .glass-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.05), 0 4px 6px -4px rgb(0 0 0 / 0.05);
      }

      /* Refined Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #CBD5E1; /* Slate 300 */
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94A3B8; /* Slate 400 */
      }
      
      /* Selection Color */
      ::selection {
        background: var(--primary-glow);
        color: var(--primary-dim);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "recharts": "https://esm.sh/recharts@^3.6.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
