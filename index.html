
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinFolio - Portfolio Analytics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Fredoka"', 'sans-serif'],
            },
            colors: {
              // Dynamic colors linked to CSS variables
              background: 'var(--bg-color)',
              surface: 'var(--surface-color)',
              border: 'var(--border-color)',
              primary: {
                DEFAULT: 'var(--primary-color)',
                glow: 'var(--primary-glow)',
                dim: 'var(--primary-dim)',
              },
              accent: {
                cyan: 'var(--accent-cyan)',
                pink: 'var(--accent-pink)',
                green: 'var(--accent-green)',
              },
              gray: {
                900: '#111827',
                800: '#1F2937',
                700: '#374151',
                600: '#4B5563',
                500: '#6B7280',
                400: '#9CA3AF',
                300: '#D1D5DB',
                200: '#E5E7EB',
                100: '#F3F4F6',
              },
              success: '#10b981', 
              danger: '#ef4444', 
            },
            animation: {
              'blob': 'blob 7s infinite',
              'fade-in': 'fadeIn 0.5s ease-out forwards',
              'bounce-in': 'bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards',
            },
            keyframes: {
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              },
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              bounceIn: {
                '0%': { transform: 'scale(0.3)', opacity: '0' },
                '50%': { transform: 'scale(1.05)' },
                '70%': { transform: 'scale(0.9)' },
                '100%': { transform: 'scale(1)', opacity: '1' },
              }
            }
          }
        }
      }
    </script>
    <style>
      :root {
        /* Default Theme (Indian Equity) - Cartoon Orange */
        --bg-color: #FFFBEB; /* Amber 50 */
        --surface-color: #FFFFFF;
        --border-color: #000000;
        --primary-color: #F97316; /* Orange 500 */
        --primary-glow: #FDBA74;
        --primary-dim: #C2410C;
        --accent-cyan: #0EA5E9;
        --accent-pink: #EC4899;
        --accent-green: #10B981;
      }

      /* Corporate Theme (Mutual Funds) - Cartoon Blue */
      .theme-corporate {
        --bg-color: #EFF6FF; /* Blue 50 */
        --surface-color: #FFFFFF;
        --border-color: #000000;
        --primary-color: #3B82F6; /* Blue 500 */
        --primary-glow: #93C5FD;
        --primary-dim: #1E40AF;
        --accent-cyan: #38BDF8;
        --accent-pink: #818CF8;
        --accent-green: #34D399;
      }

      /* Gold Theme (Gold ETF) - Cartoon Yellow */
      .theme-gold {
        --bg-color: #FEFCE8; /* Yellow 50 */
        --surface-color: #FFFFFF;
        --border-color: #000000;
        --primary-color: #EAB308; /* Yellow 500 */
        --primary-glow: #FDE047;
        --primary-dim: #854D0E;
        --accent-cyan: #FCD34D;
        --accent-pink: #F59E0B;
        --accent-green: #84CC16;
      }

      /* Sleek Theme (International) - Cartoon Cyan */
      .theme-intl {
        --bg-color: #ECFEFF; /* Cyan 50 */
        --surface-color: #FFFFFF;
        --border-color: #000000;
        --primary-color: #06B6D4; /* Cyan 500 */
        --primary-glow: #67E8F9;
        --primary-dim: #155E75;
        --accent-cyan: #22D3EE;
        --accent-pink: #A855F7;
        --accent-green: #2DD4BF;
      }

      /* Cash Theme (Cash Equivalents) - Cartoon Green */
      .theme-cash {
        --bg-color: #F0FDF4; /* Green 50 */
        --surface-color: #FFFFFF;
        --border-color: #000000;
        --primary-color: #10B981; /* Emerald 500 */
        --primary-glow: #6EE7B7;
        --primary-dim: #065F46;
        --accent-cyan: #34D399;
        --accent-pink: #059669;
        --accent-green: #10B981;
      }
      
      /* Net Worth Theme (Consolidated) - Cartoon Purple */
      .theme-networth {
        --bg-color: #FAF5FF; /* Purple 50 */
        --surface-color: #FFFFFF;
        --border-color: #000000;
        --primary-color: #8B5CF6; /* Violet 500 */
        --primary-glow: #C4B5FD;
        --primary-dim: #5B21B6;
        --accent-cyan: #F472B6;
        --accent-pink: #A78BFA;
        --accent-green: #34D399;
      }

      html, body {
        height: 100%;
        min-height: 100vh;
        background-color: var(--bg-color);
        color: #111827; /* Dark text for contrast on light bg */
        transition: background-color 0.5s ease;
      }
      
      /* Cartoon / Neubrutalist Styles */
      .bg-pattern-dots {
        background-image: radial-gradient(var(--border-color) 1px, transparent 1px);
        background-size: 20px 20px;
        opacity: 0.05;
      }
      
      .bg-pattern-grid {
        background-image: linear-gradient(var(--border-color) 1px, transparent 1px),
                          linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
        background-size: 40px 40px;
        opacity: 0.05;
      }

      .glass-panel {
        background: var(--surface-color);
        border: 3px solid var(--border-color);
        box-shadow: 6px 6px 0px 0px rgba(0,0,0,1);
        border-radius: 16px;
      }
      
      .glass-card {
        background: var(--surface-color);
        border: 3px solid var(--border-color);
        box-shadow: 4px 4px 0px 0px rgba(0,0,0,1);
        border-radius: 12px;
        transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }
      
      .glass-card:hover {
        transform: translate(-2px, -2px);
        box-shadow: 6px 6px 0px 0px rgba(0,0,0,1);
        border-color: var(--border-color);
      }

      /* Custom Scrollbar - Chunky */
      ::-webkit-scrollbar {
        width: 12px;
        height: 12px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg-color);
        border-left: 2px solid var(--border-color);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--primary-color);
        border: 2px solid var(--border-color);
        border-radius: 6px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--primary-dim); 
      }
      
      /* Selection Color */
      ::selection {
        background: var(--primary-color);
        color: white;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "recharts": "https://esm.sh/recharts@^3.6.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
